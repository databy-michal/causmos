runtime: python312
entrypoint: gunicorn -b :$PORT main:app -w 2 --timeout=300
instance_class: F4_1G

handlers:
  # Static files configuration
  - url: /static
    static_dir: static
    secure: always
    redirect_http_response_code: 301
    http_headers:
      Access-Control-Allow-Origin: https://[PROJECT_ID].ew.r.appspot.com
      X-Content-Type-Options: nosniff
      X-Frame-Options: SAMEORIGIN
      # Note: Cookie headers are usually handled by your Flask app code, 
      # but keeping them here as per your original config.
      SESSION_COOKIE_SECURE: "true"
      SESSION_COOKIE_HTTPONLY: "true"
      SESSION_COOKIE_SAMESITE: 'Lax'

  - url: /favicon\.ico
    static_files: static/favicon.ico
    upload: static/favicon.ico

  # Main application routing
  - url: /.*
    script: auto
    secure: always
    redirect_http_response_code: 301

inbound_services:
  - warmup

env_variables:
  SLIDE_TEMPLATE: "" # Google Slide template ID for the default template

# SECRETS REMINDER (Store in Secret Manager, not here):
# client_secret, flask_secret_key, developer_token, image_bucket
